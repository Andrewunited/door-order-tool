<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Door Order Summary — United Porte</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F4EF;
    --ink: #1A1916;
    --ink-muted: #6B6760;
    --ink-faint: #B8B5B0;
    --accent: #C4622D;
    --accent-light: #F2E8E1;
    --success: #3A6B4A;
    --success-light: #E6F0E9;
    --border: rgba(26,25,22,0.12);
    --serif: 'DM Serif Display', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
    --radius: 10px;
  }

  body {
    font-family: var(--sans);
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page {
    max-width: 740px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 2.5rem 0 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }
  .header-logo {
    font-family: var(--serif);
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 0.5rem;
  }
  .header h1 {
    font-family: var(--serif);
    font-size: 2.2rem;
    font-weight: 400;
    color: var(--ink);
  }

  /* Upload zone */
  .upload-zone {
    border: 1.5px dashed var(--ink-faint);
    border-radius: var(--radius);
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: white;
    margin-bottom: 1rem;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .upload-icon {
    width: 40px; height: 40px;
    margin: 0 auto 0.75rem;
    opacity: 0.35;
  }
  .upload-zone p { font-size: 14px; color: var(--ink-muted); }
  .upload-zone strong { color: var(--ink); font-weight: 500; }
  #file-input { display: none; }

  /* API key */
  .api-row {
    display: flex; gap: 8px; margin-bottom: 1.5rem;
  }
  .api-row input {
    flex: 1;
    font-family: var(--sans);
    font-size: 13px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: white;
    color: var(--ink);
    outline: none;
  }
  .api-row input:focus { border-color: var(--accent); }
  .api-row input::placeholder { color: var(--ink-faint); }

  /* Buttons */
  .btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    padding: 9px 20px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: white;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover { background: #EDEBE6; }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--ink);
    color: var(--cream);
    border-color: var(--ink);
    width: 100%;
    padding: 12px;
    font-size: 14px;
    margin-bottom: 1.5rem;
  }
  .btn-primary:hover { background: #333; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Status */
  .status {
    font-size: 13px;
    color: var(--ink-muted);
    text-align: center;
    margin-bottom: 1rem;
    min-height: 20px;
  }
  .status.error { color: var(--accent); }

  /* Output card */
  .output-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
  }
  .output-card.visible { display: block; }
  .output-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: #FAFAF8;
  }
  .output-toolbar span {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .copy-actions { display: flex; gap: 8px; align-items: center; }
  .copy-confirm {
    font-size: 12px;
    color: var(--success);
    opacity: 0;
    transition: opacity 0.3s;
  }
  #email-output {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.75;
    color: var(--ink);
    padding: 1.5rem;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 200px;
  }

  /* Info note */
  .info-note {
    font-size: 12px;
    color: var(--ink-muted);
    text-align: center;
    margin-top: 1.5rem;
    line-height: 1.6;
  }
  .info-note a { color: var(--accent); text-decoration: none; }
  .info-note a:hover { text-decoration: underline; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-logo">United Porte</div>
    <h1>Door Order Summary</h1>
  </div>

  <!-- API Key -->
  <div class="api-row">
    <input type="password" id="api-key" placeholder="Paste your Anthropic API key (sk-ant-...)" autocomplete="off" />
    <button class="btn" onclick="toggleKey()">Show</button>
  </div>

  <!-- Upload -->
  <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
    <svg class="upload-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 26V14M20 14L15 19M20 14L25 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M10 28C7.2 28 5 25.8 5 23C5 20.5 6.8 18.4 9.2 18.1C9.1 17.7 9 17.4 9 17C9 13.7 11.7 11 15 11C15.9 11 16.8 11.2 17.5 11.6C18.6 9.5 20.8 8 23.5 8C27.1 8 30 10.9 30 14.5C30 14.7 30 14.8 30 15C32.2 15.7 34 17.7 34 20C34 22.8 31.8 25 29 25" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <p><strong>Click to upload</strong> or drag and drop your PDF invoice</p>
    <p style="margin-top:4px; font-size:12px;">PDF files only</p>
  </div>
  <input type="file" id="file-input" accept=".pdf" />

  <div class="divider"></div>

  <button class="btn btn-primary" id="generate-btn" onclick="generateSummary()" disabled>
    Generate Email Summary
  </button>

  <div class="status" id="status"></div>

  <!-- Output -->
  <div class="output-card" id="output-card">
    <div class="output-toolbar">
      <span>Email ready</span>
      <div class="copy-actions">
        <span class="copy-confirm" id="copy-confirm">Copied!</span>
        <button class="btn" onclick="copyEmail()">Copy to clipboard</button>
      </div>
    </div>
    <div id="email-output"></div>
  </div>

  <p class="info-note">
    Your API key is used only in your browser and never stored or sent anywhere except directly to Anthropic.<br/>
    Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
  </p>

</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfText = '';
  let emailText = '';

  // Toggle API key visibility
  function toggleKey() {
    const input = document.getElementById('api-key');
    const btn = event.target;
    if (input.type === 'password') { input.type = 'text'; btn.textContent = 'Hide'; }
    else { input.type = 'password'; btn.textContent = 'Show'; }
  }

  // Drag and drop
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') handleFile(file);
  });

  document.getElementById('file-input').addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });

  async function handleFile(file) {
    setStatus('Reading PDF...');
    try {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(item => item.str).join(' ') + '\n';
      }
      pdfText = text;
      zone.querySelector('p').innerHTML = `<strong>${file.name}</strong> loaded — ${pdf.numPages} page(s)`;
      setStatus('PDF ready. Click Generate to create the email summary.');
      checkReady();
    } catch(err) {
      setStatus('Could not read PDF. Make sure it is a text-based PDF, not a scanned image.', true);
    }
  }

  document.getElementById('api-key').addEventListener('input', checkReady);

  function checkReady() {
    const hasKey = document.getElementById('api-key').value.trim().startsWith('sk-');
    const hasPdf = pdfText.length > 0;
    document.getElementById('generate-btn').disabled = !(hasKey && hasPdf);
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (isError ? ' error' : '');
  }

  async function generateSummary() {
    const apiKey = document.getElementById('api-key').value.trim();
    const btn = document.getElementById('generate-btn');
    const output = document.getElementById('email-output');
    const card = document.getElementById('output-card');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Generating...';
    card.classList.remove('visible');
    output.textContent = '';
    emailText = '';

    try {
      // Step 1: Generate formal intro via AI (streaming)
      setStatus('Writing professional intro...');

      const introResp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          stream: true,
          system: 'You are a professional business writing assistant for a door supply company called United Porte. Write formal, warm, and professional email copy. Return only the requested text with no explanation or preamble.',
          messages: [{
            role: 'user',
            content: `Write a 2-3 sentence formal and professional opening paragraph for a customer order confirmation email from United Porte, a door supply company. It should:
- Greet the customer warmly by first name if found in the invoice text below, otherwise use "Valued Customer"
- Let them know their complete order summary is included below for their review
- Ask them to read through all details carefully and sign the invoice to confirm their agreement and authorize the order to move into production
- Be warm but professional — not stiff or legalistic
- Do not use phrases like "I hope this email finds you well"
- End naturally, flowing into the order details that follow

Invoice text for context (extract customer name from here):
${pdfText.slice(0, 500)}

Return only the paragraph, nothing else.`
          }]
        })
      });

      const introReader = introResp.body.getReader();
      const decoder = new TextDecoder();
      let intro = '';

      while (true) {
        const { done, value } = await introReader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        for (const line of chunk.split('\n').filter(l => l.startsWith('data: '))) {
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            const parsed = JSON.parse(data);
            if (parsed.type === 'content_block_delta' && parsed.delta?.text) {
              intro += parsed.delta.text;
            }
          } catch(e) {}
        }
      }

      // Step 2: Parse invoice into structured summary
      setStatus('Analyzing invoice details...');

      const summaryResp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 3000,
          system: `You are a door order specialist at United Porte who translates technical invoices into clear, plain-English customer email summaries.

RULES:
- Do NOT include SKU numbers or internal product codes
- Write descriptions a non-expert homeowner can easily understand
- Keep item descriptions to 1-2 sentences max — clear and concise
- Use plain text formatting only (no markdown, no asterisks, no pound signs)
- Use dashes and spacing for structure
- For each included item, briefly explain what it is AND what it does/is used for
- Output only the body sections — no greeting, no sign-off`,
          messages: [{
            role: 'user',
            content: `Analyze this door order invoice and produce the structured email body sections below. Use ONLY plain text — no markdown, no bold asterisks, no # headers. Use dashes and ALL CAPS for section headers.

FORMAT TO FOLLOW EXACTLY:

────────────────────────────────────────
ORDER SUMMARY
────────────────────────────────────────
Customer:   [name]
Ship to:    [address]
Invoice #:  [number]
Date:       [date]
Due:        [due date]

────────────────────────────────────────
DOOR SPECIFICATIONS
────────────────────────────────────────
Style:            [style name and type]
Each panel:       [width x height]
Combined opening: [total width x height]
Finish / color:   [finish]
Glass:            [glass description or None]
Lock prep:        [pre-drilled or not pre-drilled]

Recommended rough opening: [dimensions]

────────────────────────────────────────
WHAT'S INCLUDED
────────────────────────────────────────
[For each item use this format:]
(qty) Item name — finish/color if applicable
    [1-2 sentence plain English description of what it is and what it does]

────────────────────────────────────────
IMPORTANT NOTES
────────────────────────────────────────
[bullet points with dot symbol for each important note or thing to verify]

────────────────────────────────────────
PRICING
────────────────────────────────────────
[line items right-aligned]
TOTAL: [amount]

────────────────────────────────────────

INVOICE TEXT:
${pdfText}`
          }]
        })
      });

      setStatus('Building your email...');
      const summaryData = await summaryResp.json();
      const summaryBody = summaryData.content?.[0]?.text || '';

      // Step 3: Compose final email
      const closing = `To confirm your order and authorize production, please sign and return the attached invoice at your earliest convenience. Should you have any questions or require clarification on any item listed, please do not hesitate to reach out before signing.

Thank you for choosing United Porte. We look forward to delivering a product you will love.

Warm regards,

United Porte Inc
8 New Hook Rd, Bayonne, NJ 07002
+1 (332) 777-7005
unitedporte@gmail.com
www.unitedporte.us`;

      emailText = `${intro}\n\n${summaryBody}\n\n${closing}`;

      output.textContent = emailText;
      card.classList.add('visible');
      setStatus('Email summary ready — copy and paste into your email client.');

    } catch(err) {
      console.error(err);
      setStatus('Something went wrong. Check your API key and try again.', true);
    }

    btn.disabled = false;
    btn.textContent = 'Generate Email Summary';
    checkReady();
  }

  function copyEmail() {
    navigator.clipboard.writeText(emailText).then(() => {
      const c = document.getElementById('copy-confirm');
      c.style.opacity = 1;
      setTimeout(() => c.style.opacity = 0, 2500);
    });
  }
</script>
</body>
</html>
